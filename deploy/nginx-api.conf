##
## Nginx config — Medcina Laravel API
## File: /etc/nginx/sites-available/api.medcina.mv
##

server {
    listen 80;
    server_name api.medcina.mv;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.medcina.mv;

    root /var/www/medcina-backend/public;
    index index.php;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/api.medcina.mv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.medcina.mv/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection         "1; mode=block" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Max upload size for product images / brochures
    client_max_body_size 20M;

    # Static files — long cache
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include       fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block direct access to .env
    location ~ /\.env {
        deny all;
    }

    access_log /var/log/nginx/medcina-api-access.log;
    error_log  /var/log/nginx/medcina-api-error.log;
}
