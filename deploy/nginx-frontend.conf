##
## Nginx config — Medcina Next.js Frontend
## File: /etc/nginx/sites-available/medcina.mv
##

server {
    listen 80;
    server_name medcina.mv www.medcina.mv;
    return 301 https://medcina.mv$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    server_name www.medcina.mv;
    ssl_certificate     /etc/letsencrypt/live/medcina.mv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medcina.mv/privkey.pem;
    return 301 https://medcina.mv$request_uri;
}

server {
    listen 443 ssl http2;
    server_name medcina.mv;

    ssl_certificate     /etc/letsencrypt/live/medcina.mv/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medcina.mv/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css application/xml;

    # Proxy to Next.js on port 3000
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Static assets — cache aggressively (Next.js hashes them)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/medcina-frontend-access.log;
    error_log  /var/log/nginx/medcina-frontend-error.log;
}
