services:

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: https://api.medcina.mv/api/v1
      API_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_SITE_URL: https://medcina.mv
      NEXT_PUBLIC_SITE_NAME: Medcina Pvt Ltd
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 0x4AAAAAADiH58JhtFA_Oh_C
    command: sh -c "npm run build && npm start"

  backend:
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://api.medcina.mv
      FRONTEND_URL: https://medcina.mv
      APP_KEY: "${APP_KEY}"
      TURNSTILE_SECRET_KEY: "${TURNSTILE_SECRET_KEY}"
      SESSION_DRIVER: cookie
